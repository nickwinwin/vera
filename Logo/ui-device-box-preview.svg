<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background / Container (medical-card style) -->
  <rect x="10" y="10" width="780" height="180" rx="8" fill="white" stroke="#E8E2D9" stroke-width="1"/>
  
  <!-- Shadow effect (simplified) -->
  <rect x="10" y="188" width="780" height="2" fill="#000000" fill-opacity="0.06"/>

  <!-- Left Section: Icon and Name -->
  <g transform="translate(34, 58)">
    <!-- Icon Box (w-16 h-16 bg-brand-warm-white) -->
    <rect width="64" height="64" rx="8" fill="#F8F6F2"/>
    
    <!-- Shield Icon (Lucide Shield w-8 h-8 text-brand-beige) -->
    <g transform="translate(16, 16) scale(1.33)">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Device Info -->
    <text x="88" y="24" font-family="serif" font-size="20" font-weight="bold" fill="#1A1A1A">Beispiel Gerät</text>
    <text x="88" y="48" font-family="sans-serif" font-size="14" fill="#999999">Laser • S/N: VERA-2026-001</text>
  </g>

  <!-- Middle Section: Stats -->
  <g transform="translate(450, 75)">
    <text x="0" y="0" font-family="sans-serif" font-size="10" font-weight="bold" fill="#999999" text-transform="uppercase">DOKUMENTE</text>
    <text x="0" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1A1A1A">5</text>
  </g>

  <g transform="translate(580, 75)">
    <text x="0" y="0" font-family="sans-serif" font-size="10" font-weight="bold" fill="#999999" text-transform="uppercase">STATUS</text>
    <!-- Status: Konform (CheckCircle2 + Text) -->
    <g transform="translate(0, 10)">
      <circle cx="8" cy="8" r="7" stroke="#4A9B6F" stroke-width="2"/>
      <path d="M5 8l2 2 4-4" stroke="#4A9B6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="13" font-family="sans-serif" font-size="14" font-weight="medium" fill="#4A9B6F">Konform</text>
    </g>
  </g>

  <!-- Right Section: Buttons -->
  <g transform="translate(680, 75)">
    <!-- btn-outline (simplified) -->
    <rect width="90" height="36" rx="8" stroke="#C9A84C" stroke-width="1"/>
    <text x="45" y="22" font-family="sans-serif" font-size="12" font-weight="medium" fill="#C9A84C" text-anchor="middle">Dokumente</text>
  </g>
</svg>
