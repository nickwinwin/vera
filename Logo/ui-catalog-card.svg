<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background / Container (medical-card bg-white overflow-hidden) -->
  <rect x="10" y="10" width="380" height="580" rx="8" fill="white" stroke="#E8E2D9" stroke-width="1"/>
  
  <!-- Top Section: Image Placeholder (h-48 bg-brand-warm-white) -->
  <rect x="10" y="10" width="380" height="192" rx="8" fill="#F8F6F2"/>
  
  <!-- Big Shield Check Icon (ShieldCheckIcon w-24 h-24 text-brand-beige/20) -->
  <g transform="translate(152, 58) scale(4)">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m9 12 2 2 4-4" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Category Badge (absolute top-4 right-4) -->
  <rect x="300" y="26" width="70" height="20" rx="4" fill="white" fill-opacity="0.8"/>
  <text x="335" y="40" font-family="sans-serif" font-size="10" font-weight="bold" fill="#999999" text-anchor="middle">LASER</text>

  <!-- Content Section (p-6) -->
  <g transform="translate(34, 230)">
    <!-- Manufacturer (text-brand-beige uppercase tracking-widest) -->
    <text y="0" font-family="sans-serif" font-size="12" font-weight="bold" fill="#C9A84C" letter-spacing="0.1em">LUMENIS</text>
    
    <!-- Device Name (text-xl font-bold) -->
    <text y="30" font-family="serif" font-size="24" font-weight="bold" fill="#1A1A1A">Splendor X</text>
    
    <!-- Required Documents Section -->
    <text y="70" font-family="sans-serif" font-size="10" font-weight="bold" fill="#999999">ERFORDERLICHE DOKUMENTE:</text>
    
    <!-- Document Badges -->
    <g transform="translate(0, 85)">
      <rect width="80" height="24" rx="4" fill="#F8F6F2" stroke="#E8E2D9" stroke-width="1"/>
      <text x="40" y="16" font-family="sans-serif" font-size="10" fill="#555555" text-anchor="middle">Bedienungsanleitung</text>
      
      <rect x="90" width="60" height="24" rx="4" fill="#F8F6F2" stroke="#E8E2D9" stroke-width="1"/>
      <text x="120" y="16" font-family="sans-serif" font-size="10" fill="#555555" text-anchor="middle">Fachkunde</text>
    </g>
  </g>

  <!-- Footer Section: Buttons (flex gap-2) -->
  <g transform="translate(34, 520)">
    <!-- Details Button (btn-outline) -->
    <rect width="160" height="40" rx="8" stroke="#C9A84C" stroke-width="1"/>
    <text x="80" y="25" font-family="sans-serif" font-size="14" font-weight="medium" fill="#C9A84C" text-anchor="middle">Details</text>
    
    <!-- Add Button (btn-primary) -->
    <rect x="172" width="160" height="40" rx="8" fill="#C9A84C"/>
    <text x="252" y="25" font-family="sans-serif" font-size="14" font-weight="medium" fill="white" text-anchor="middle">+ Hinzufügen</text>
  </g>
</svg>
