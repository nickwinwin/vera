<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Card Container -->
  <rect width="400" height="600" rx="24" fill="white" />
  <rect x="0.5" y="0.5" width="399" height="599" rx="23.5" stroke="#E5E7EB" stroke-opacity="0.5" />

  <!-- Top Section: Visual Shield Area -->
  <path d="M0 24C0 10.7452 10.7452 0 24 0H376C389.255 0 400 10.7452 400 24V240H0V24Z" fill="#FDFBF7" />
  
  <!-- Category Badge (Top Right) -->
  <rect x="300" y="20" width="80" height="28" rx="6" fill="white" />
  <text x="340" y="38" fill="#6B7280" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="0.1em">LASER</text>

  <!-- VERA Logo Shield (Exact Match from Screenshot) -->
  <g transform="translate(120, 40)">
    <!-- Outer Shield Path -->
    <path d="M80 20C80 20 130 40 130 90C130 140 80 160 80 160C80 160 30 140 30 90C30 40 80 20 80 20Z" stroke="#C5A267" stroke-width="3.5" stroke-opacity="0.3" fill="none" />
    <!-- Inner Checkmark Path -->
    <path d="M60 90L73.3333 103.333L100 76.6667" stroke="#C5A267" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Content Section -->
  <!-- Static Label -->
  <text x="24" y="280" fill="#C5A267" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="0.1em">KATEGORIE</text>
  
  <!-- Category Name (Primary Title) -->
  <text x="24" y="320" fill="#111827" font-family="serif" font-size="32" font-weight="bold">Laser-Haarentfernung</text>

  <!-- Required Documents Label -->
  <text x="24" y="380" fill="#9CA3AF" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.05em">ERFORDERLICHE DOKUMENTE:</text>

  <!-- Document Tags -->
  <rect x="24" y="400" width="120" height="32" rx="6" fill="#FDFBF7" stroke="#E5E7EB" stroke-opacity="0.5" />
  <text x="84" y="420" fill="#4B5563" font-family="sans-serif" font-size="10" font-weight="medium" text-anchor="middle">Bedienungsanleitung</text>

  <rect x="152" y="400" width="80" height="32" rx="6" fill="#FDFBF7" stroke="#E5E7EB" stroke-opacity="0.5" />
  <text x="192" y="420" fill="#4B5563" font-family="sans-serif" font-size="10" font-weight="medium" text-anchor="middle">Fachkunde</text>

  <!-- Divider -->
  <line x1="24" y1="500" x2="376" y2="500" stroke="#F3F4F6" stroke-width="1" />

  <!-- Action Buttons -->
  <rect x="24" y="520" width="168" height="48" rx="12" fill="white" stroke="#C5A267" stroke-width="1" />
  <text x="108" y="550" fill="#C5A267" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Details</text>

  <rect x="208" y="520" width="168" height="48" rx="12" fill="#C5A267" />
  <text x="292" y="550" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">+ Hinzufügen</text>
</svg>
