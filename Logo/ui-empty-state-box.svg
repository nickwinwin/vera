<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background / Container (medical-card bg-white p-12 text-center) -->
  <rect x="20" y="20" width="760" height="360" rx="8" fill="white" stroke="#E8E2D9" stroke-width="1"/>
  
  <!-- Shadow effect -->
  <rect x="20" y="378" width="760" height="2" fill="#000000" fill-opacity="0.06"/>

  <!-- Center Content -->
  <g transform="translate(400, 200)">
    <!-- Big Shield Icon (Shield w-12 h-12 text-brand-border mx-auto mb-4) -->
    <g transform="translate(-48, -120) scale(4)">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" stroke="#E8E2D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Text: Noch keine Geräte hinzugefügt. (text-brand-secondary) -->
    <text y="20" font-family="sans-serif" font-size="24" fill="#555555" text-anchor="middle">Noch keine Geräte hinzugefügt.</text>
    
    <!-- Link: Zum Katalog gehen (text-brand-beige font-bold hover:underline mt-2 inline-block) -->
    <text y="60" font-family="sans-serif" font-size="20" font-weight="bold" fill="#C9A84C" text-anchor="middle" text-decoration="underline">Zum Katalog gehen</text>
  </g>
</svg>
